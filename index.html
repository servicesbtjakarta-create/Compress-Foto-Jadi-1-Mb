<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompres Foto di Bawah 1 MB</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        #result { margin-top: 20px; }
        img { max-width: 100%; border: 1px solid #ccc; padding: 5px; border-radius: 5px; }
        .btn { display: inline-block; padding: 10px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; margin-top: 10px; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h2>Alat Pengompres Foto (< 1 MB)</h2>
    <p>Pilih foto yang ingin dikompres. Sistem otomatis menurunkannya hingga di bawah 1 MB.</p>

    <!-- Input file -->
    <input type="file" id="upload" accept="image/*">
    <div id="settings" style="display:none; margin-top: 10px;">
    <label for="fileName">Nama file hasil:</label>
    <input type="text" id="fileName" value="foto-kompres"> .jpg
</div>

    <!-- Canvas disembunyikan karena hanya dipakai untuk memproses gambar -->
    <canvas id="canvas" style="display:none;"></canvas>

    <!-- Tempat menampilkan hasil -->
    <div id="result"></div>

    <!-- Menghubungkan ke file JavaScript -->
    <script src="app.js"></script>
</body>
</html>
